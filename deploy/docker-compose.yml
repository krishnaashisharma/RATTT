version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rdm-postgres
    environment:
      POSTGRES_USER: rdm
      POSTGRES_PASSWORD: rdm
      POSTGRES_DB: rdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rdm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rdm-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://rdm:rdm@postgres:5432/rdm"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/etc/remote-device-mgmt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: rdm-dashboard
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "https://localhost:8443"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

networks:
  default:
    name: rdm-network
